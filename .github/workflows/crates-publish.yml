name: CI and Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Generate lockfile
        run: cargo generate-lockfile

      # - name: Run tests
      #   run: cargo test --all-targets --locked

      - name: Check publish package
        run: cargo package --locked

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Ensure tag matches Cargo.toml version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version="$(grep '^version = ' Cargo.toml | head -n1 | cut -d'"' -f2)"
          if [[ "$tag_version" != "$manifest_version" ]]; then
            echo "Tag version v$tag_version does not match Cargo.toml version $manifest_version"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
